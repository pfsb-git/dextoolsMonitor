name: Monitor Playwright
on:
  schedule:
    - cron: '15 * * * *'  # minuto 15 de cada hora
    - cron: '45 * * * *'  # minuto 45 de cada hora
  workflow_dispatch:       # permite ejecutar manualmente

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repositorio
        uses: actions/checkout@v3

      # 2️⃣ Configurar Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3️⃣ Instalar dependencias
      - name: Instalar dependencias
        run: npm install

      # 4️⃣ Ejecutar tests de Playwright
      - name: Ejecutar tests Playwright
        run: npx playwright test

      # 5️⃣ Definir nombre único para artefacto
      - name: Definir nombre de artefacto
        run: echo "ARTIFACT_NAME=reportes-playwright-${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      # 6️⃣ Guardar reportes, capturas y videos
      - name: Guardar reportes y capturas
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            playwright-report
            test-results
            screenshots       
