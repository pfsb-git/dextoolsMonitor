name: Monitor Playwright
on:
  workflow_dispatch:  # Permite lanzar a mano desde GitHub

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - uses: actions/checkout@v3

      # 2️⃣ Configurar Node.js para tus tests
      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3️⃣ Instalar dependencias
      - run: npm install

      # 4️⃣ Ejecutar tu código Playwright
      - run: npx playwright test
